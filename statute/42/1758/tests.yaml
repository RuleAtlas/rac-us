# ==============================================================================

  - name: "Student at CEP school - free meals"
    description: "All students at CEP schools get free meals regardless of income"
    inputs:
      household_size: 4
      household_gross_annual_income: 150000  # High income
      is_foster_child: false
      is_homeless: false
      is_migrant: false
      receives_snap: false
      receives_tanf: false
