# Tests for 42 USC 1758 - School Lunch and Breakfast Program Eligibility
#
# National School Lunch Act (NSLA) establishes eligibility for free and
# reduced-price meals in the National School Lunch Program (NSLP) and
# School Breakfast Program (SBP).
#
# Eligibility categories:
# 1. Income eligibility: Based on Federal Poverty Guidelines
#    - Free meals: <= 130% FPL
#    - Reduced-price meals: 130-185% FPL
#    - Paid meals: > 185% FPL
# 2. Categorical eligibility: Automatic eligibility through program participation
#    - SNAP household members: Free meals
#    - TANF recipients: Free meals
#    - FDPIR (Food Distribution Program on Indian Reservations): Free meals
#    - Foster children: Free meals
#    - Head Start participants: Free meals
#    - Homeless children (McKinney-Vento): Free meals
#    - Migrant children: Free meals
#    - Runaway/homeless youth: Free meals
# 3. Direct certification: State match with benefit programs
# 4. Community Eligibility Provision (CEP): School-wide free meals
#
# Test organization:
# 1. Income eligibility tests
# 2. Categorical eligibility tests
# 3. Combined eligibility tests
# 4. Meal tier determination tests

variable: school_meal_eligibility_tier
school_year: 2024-2025

# ==============================================================================
# 42 USC 1758(b)(1) - Income Eligibility Guidelines
# "(1) Not later than June 1 of each fiscal year, the Secretary shall prescribe
# income guidelines for determining eligibility for free and reduced price
# lunches during the following school year..."
# ==============================================================================

test_cases:
  # --- FREE MEALS: Income at or below 130% FPL ---
  - name: "Zero income - free meals"
    description: "Household with no income qualifies for free meals"
    inputs:
      household_size: 1
      household_gross_annual_income: 0
      is_foster_child: false
      is_homeless: false
      is_migrant: false
      receives_snap: false
      receives_tanf: false
      receives_fdpir: false
      attends_head_start: false
      attends_cep_school: false
    expected:
      school_meal_income_eligible_free: true
      school_meal_income_eligible_reduced: true
      school_meal_eligibility_tier: "free"
    citations:
      - "42 USC 1758(b)(1): income guidelines for free meals"

  - name: "1-person at exactly 130% FPL - free meals"
    description: "Income at 130% FPL threshold qualifies for free meals"
    inputs:
      household_size: 1
      household_gross_annual_income: 20345  # 130% of $15,650 = $20,345
      is_foster_child: false
      is_homeless: false
      is_migrant: false
      receives_snap: false
      receives_tanf: false
      receives_fdpir: false
      attends_head_start: false
      attends_cep_school: false
    expected:
      school_meal_income_eligible_free: true
      school_meal_eligibility_tier: "free"
    citations:
      - "42 USC 1758(b)(1)(A): free meals at or below 130% FPL"

  # --- REDUCED PRICE MEALS: 130-185% FPL ---
  - name: "1-person at 140% FPL - reduced price meals"
    description: "Income between 130% and 185% FPL qualifies for reduced price"
    inputs:
      household_size: 1
      household_gross_annual_income: 21910  # 140% of $15,650
      is_foster_child: false
      is_homeless: false
      is_migrant: false
      receives_snap: false
      receives_tanf: false
      receives_fdpir: false
      attends_head_start: false
      attends_cep_school: false
    expected:
      school_meal_income_eligible_free: false
      school_meal_income_eligible_reduced: true
      school_meal_eligibility_tier: "reduced"
    citations:
      - "42 USC 1758(b)(1)(A): reduced price between 130-185% FPL"

  - name: "1-person at exactly 185% FPL - reduced price meals"
    description: "Income at 185% FPL threshold qualifies for reduced price"
    inputs:
      household_size: 1
      household_gross_annual_income: 28952  # 185% of $15,650 = $28,952.50
      is_foster_child: false
      is_homeless: false
      is_migrant: false
      receives_snap: false
      receives_tanf: false
      receives_fdpir: false
      attends_head_start: false
      attends_cep_school: false
    expected:
      school_meal_income_eligible_reduced: true
      school_meal_eligibility_tier: "reduced"
    citations:
      - "42 USC 1758(b)(1)(A): at or below 185% FPL"

  # --- PAID MEALS: Above 185% FPL ---
  - name: "1-person over 185% FPL - paid meals"
    description: "Income above 185% FPL does not qualify for free or reduced"
    inputs:
      household_size: 1
      household_gross_annual_income: 35000
      is_foster_child: false
      is_homeless: false
      is_migrant: false
      receives_snap: false
      receives_tanf: false
      receives_fdpir: false
      attends_head_start: false
      attends_cep_school: false
    expected:
