# ==============================================================================
# 42 USC 1786(d)(2) - Income Eligibility
# "(2)(A) State agencies shall establish income eligibility standards to be
# used in conjunction with the nutrition risk criteria..."
# "(B) Income eligibility standards shall be set at 185 percent of the
# poverty income guidelines"
# ==============================================================================

  - name: "Income at 185% FPL - income eligible"
    description: "Income exactly at 185% FPL threshold"
    inputs:
      age: 2
      is_pregnant: false
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 2853  # 185% of $1,543 (1-person monthly FPL)
      household_size: 1
      is_us_resident: true
      receives_snap: false
      receives_medicaid: false
      receives_tanf: false
    expected:
      wic_income_pct_fpl: 1.85
      is_wic_income_eligible: true
    citations:
      - "42 USC 1786(d)(2)(B): 185% poverty guideline"

  - name: "Income below 185% FPL - income eligible"
    description: "Income under threshold"
    inputs:
      age: 2
      is_pregnant: false
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 2000
      household_size: 1
      is_us_resident: true
      receives_snap: false
      receives_medicaid: false
      receives_tanf: false
    expected:
      is_wic_income_eligible: true
    citations:
      - "42 USC 1786(d)(2)(B): income <= 185% FPL"

  - name: "Income above 185% FPL - income ineligible"
    description: "Income exceeds threshold"
    inputs:
      age: 2
      is_pregnant: false
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 4000
      household_size: 1
      is_us_resident: true
      receives_snap: false
      receives_medicaid: false
      receives_tanf: false
    expected:
      is_wic_income_eligible: false
    citations:
      - "42 USC 1786(d)(2)(B): exceeds 185% FPL"

  - name: "Family of 4 at 185% FPL - income eligible"
    description: "Larger family with proportional income"
    inputs:
      age: 3
      is_pregnant: false
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 5750  # ~185% of monthly FPL for 4-person household
      household_size: 4
      is_us_resident: true
      receives_snap: false
      receives_medicaid: false
      receives_tanf: false
    expected:
      is_wic_income_eligible: true
    citations:
      - "42 USC 1786(d)(2)(B): household size adjustment"

