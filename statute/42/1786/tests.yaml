      age: 5
      is_pregnant: false
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 0
      household_size: 3
      is_us_resident: true
    expected:
      is_wic_categorical_eligible: false
    citations:
      - "42 USC 1786(b)(4): child must be under 5"

  - name: "Adult woman not pregnant/breastfeeding/postpartum - ineligible"
    description: "Non-qualifying adult"
    inputs:
      age: 35
      is_pregnant: false
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 0
      household_size: 1
