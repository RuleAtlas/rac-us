      is_pregnant: false
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 10000  # Over 185% FPL
      household_size: 2
      is_us_resident: true
      receives_snap: false
      receives_medicaid: false
      receives_tanf: true
    expected:
      is_wic_adjunctively_eligible: true
      is_wic_income_eligible: true
    citations:
      - "42 USC 1786(d)(2)(C): TANF participation"

  - name: "No program participation, over income - ineligible"
