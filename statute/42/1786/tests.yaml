    citations:
      - "42 USC 1786(b)(4): child means 1 to 5 years"

  - name: "Child age 4 - categorically eligible"
    description: "4-year-old qualifies (under 5)"
    inputs:
      age: 4
      is_pregnant: false
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 0
      household_size: 3
      is_us_resident: true
    expected:
      is_wic_categorical_eligible: true
