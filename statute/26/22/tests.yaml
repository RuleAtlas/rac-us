# Tests for 26 USC 22 - Credit for the Elderly and the Disabled
#
# IRC Section 22 provides a credit for low-to-moderate income elderly (65+) or
# permanently disabled individuals.
#
# Key rules tested:
#   - 22(a): 15% credit rate
#   - 22(c): Initial amounts: $5,000 single, $7,500 joint (both qualified), $3,750 MFS
#   - 22(d)(1): Reduction for Social Security, pensions, disability income
#   - 22(d)(2): 50% of AGI above threshold ($7,500 single, $10,000 joint, $5,000 MFS)
#   - 22(e): Qualified individual = 65+ OR permanently disabled

reference: "26 USC 22"
tax_year: 2024

tests:
  # ============================================================================
  # Basic Eligibility - Elderly (65+)
  # ============================================================================

  - name: "Single elderly, no income reductions"
    description: "Age 65+, no Social Security or pensions, low AGI"
    inputs:
      filing_status: single
      adjusted_gross_income: 5000
      tax_liability_before_credits: 400
      persons:
        taxpayer:
          age: 67
          is_tax_unit_head: true
      nontaxable_social_security: 0
      taxable_pension_annuity: 0
    expected:
      is_sec22_qualified_individual:
        taxpayer: true
      num_sec22_qualified_individuals: 1
      sec22_initial_amount: 5000
      sec22_nontaxable_reduction: 0
      sec22_agi_reduction: 0  # AGI below $7,500 threshold
      adjusted_sec22_amount: 5000
      sec22_tentative_credit: 750  # 5000 * 0.15
      elderly_disabled_credit: 400  # Limited by tax liability
    citations:
      - "26 USC 22(c)(1)(A)(iii): $5,000 for single individual"
      - "26 USC 22(a): 15% credit rate"

  - name: "Single elderly, maximum credit"
    description: "Age 65+, very low AGI, sufficient tax liability"
    inputs:
      filing_status: single
      adjusted_gross_income: 3000
      tax_liability_before_credits: 1000
      persons:
        taxpayer:
          age: 70
          is_tax_unit_head: true
      nontaxable_social_security: 0
      taxable_pension_annuity: 0
    expected:
      sec22_initial_amount: 5000
      sec22_agi_reduction: 0  # AGI below threshold
      adjusted_sec22_amount: 5000
      sec22_tentative_credit: 750
      elderly_disabled_credit: 750  # Full credit (under tax liability)
    citations:
      - "26 USC 22: maximum credit is $750 for single ($5,000 * 15%)"

  # ============================================================================
  # Joint Filers - Both Spouses Qualified
  # ============================================================================

  - name: "Joint filers, both 65+, no reductions"
    description: "Both spouses age 65+, low income"
    inputs:
      filing_status: joint
      adjusted_gross_income: 8000
      tax_liability_before_credits: 1500
      persons:
        head:
          age: 68
          is_tax_unit_head: true
        spouse:
          age: 66
          is_tax_unit_spouse: true
      nontaxable_social_security: 0
      taxable_pension_annuity: 0
    expected:
      is_sec22_qualified_individual:
        head: true
        spouse: true
      num_sec22_qualified_individuals: 2
      sec22_initial_amount: 7500  # Both qualified
      sec22_agi_reduction: 0  # AGI below $10,000 threshold
      adjusted_sec22_amount: 7500
      sec22_tentative_credit: 1125  # 7500 * 0.15
      elderly_disabled_credit: 1125
    citations:
      - "26 USC 22(c)(1)(B): $7,500 for joint where both qualified"

  - name: "Joint filers, only one 65+"
    description: "One spouse 65+, other under 65 (not disabled)"
    inputs:
      filing_status: joint
      adjusted_gross_income: 9000
      tax_liability_before_credits: 800
      persons:
        head:
          age: 67
          is_tax_unit_head: true
        spouse:
          age: 60
          is_tax_unit_spouse: true
          is_permanently_disabled: false
      nontaxable_social_security: 0
    expected:
      is_sec22_qualified_individual:
        head: true
        spouse: false
      num_sec22_qualified_individuals: 1
      sec22_initial_amount: 5000  # Only one qualified
      sec22_tentative_credit: 750
      elderly_disabled_credit: 750
    citations:
      - "26 USC 22(c)(1)(A)(i): $5,000 for joint with one qualified"

  # ============================================================================
  # Married Filing Separately
  # ============================================================================

  - name: "Married filing separately, age 65+"
    description: "MFS filer gets $3,750 initial amount"
    inputs:
      filing_status: separate
      adjusted_gross_income: 4000
      tax_liability_before_credits: 600
      persons:
        taxpayer:
          age: 66
          is_tax_unit_head: true
      nontaxable_social_security: 0
    expected:
      sec22_initial_amount: 3750
      sec22_agi_reduction: 0  # AGI below $5,000 threshold
      adjusted_sec22_amount: 3750
      sec22_tentative_credit: 562.50  # 3750 * 0.15
      elderly_disabled_credit: 562.50
    citations:
      - "26 USC 22(c)(1)(C): $3,750 for married filing separately"
      - "26 USC 22(d)(2)(C): $5,000 AGI threshold for MFS"

  # ============================================================================
  # Disabled Individual Tests
  # ============================================================================

  - name: "Disabled individual under 65"
    description: "Permanently disabled qualifies under 22(e)(1)(B)"
    inputs:
      filing_status: single
      adjusted_gross_income: 5000
      tax_liability_before_credits: 500
      persons:
        taxpayer:
          age: 55
          is_tax_unit_head: true
          is_permanently_disabled: true
      nontaxable_social_security: 0
    expected:
      is_sec22_qualified_individual:
        taxpayer: true
      num_sec22_qualified_individuals: 1
      sec22_initial_amount: 5000
      sec22_tentative_credit: 750
    citations:
      - "26 USC 22(e)(1)(B): permanently and totally disabled qualifies"

  - name: "Under 65, not disabled - no credit"
    description: "Must be 65+ OR disabled to qualify"
    inputs:
      filing_status: single
      adjusted_gross_income: 5000
      tax_liability_before_credits: 500
      persons:
        taxpayer:
          age: 55
          is_tax_unit_head: true
          is_permanently_disabled: false
      nontaxable_social_security: 0
    expected:
      is_sec22_qualified_individual:
        taxpayer: false
      num_sec22_qualified_individuals: 0
      sec22_initial_amount: 0
      elderly_disabled_credit: 0
    citations:
      - "26 USC 22(e)(1): must be 65+ or permanently disabled"

  # ============================================================================
  # Social Security Reduction - 22(d)(1)
  # ============================================================================

  - name: "Social Security reduces section 22 amount"
    description: "Nontaxable Social Security reduces the initial amount"
    inputs:
      filing_status: single
      adjusted_gross_income: 6000
      tax_liability_before_credits: 500
      persons:
        taxpayer:
          age: 68
          is_tax_unit_head: true
      nontaxable_social_security: 3000
    expected:
      sec22_initial_amount: 5000
      sec22_nontaxable_reduction: 3000
      adjusted_sec22_amount: 2000  # 5000 - 3000
      sec22_tentative_credit: 300  # 2000 * 0.15
    citations:
      - "26 USC 22(d)(1)(A): reduced by Social Security benefits"

  - name: "Social Security fully phases out credit"
    description: "Social Security exceeds initial amount"
    inputs:
      filing_status: single
      adjusted_gross_income: 10000
      tax_liability_before_credits: 500
      persons:
        taxpayer:
          age: 70
          is_tax_unit_head: true
      nontaxable_social_security: 6000
    expected:
      sec22_initial_amount: 5000
      sec22_nontaxable_reduction: 6000
      adjusted_sec22_amount: 0  # max(0, 5000 - 6000)
      sec22_tentative_credit: 0
      elderly_disabled_credit: 0
    citations:
      - "26 USC 22(d)(1): reduction cannot exceed initial amount"

  # ============================================================================
  # Pension Reduction - 22(d)(1)
  # ============================================================================

  - name: "Taxable pension reduces section 22 amount"
    description: "Taxable pension income reduces the initial amount"
    inputs:
      filing_status: single
      adjusted_gross_income: 8000
      tax_liability_before_credits: 400
      persons:
        taxpayer:
          age: 67
          is_tax_unit_head: true
      nontaxable_social_security: 1000
      taxable_pension_annuity: 2000
    expected:
      sec22_initial_amount: 5000
      sec22_nontaxable_reduction: 3000  # 1000 + 2000
      adjusted_sec22_amount: 1750  # 5000 - 3000 - 250 (AGI reduction)
      sec22_agi_reduction: 250  # (8000 - 7500) * 0.5
    citations:
      - "26 USC 22(d)(1)(B): pensions/annuities reduce section 22 amount"

  # ============================================================================
  # AGI Reduction - 22(d)(2)
  # ============================================================================

  - name: "Single, AGI above threshold"
    description: "AGI $10,000 - excess of $2,500 over $7,500 threshold"
    inputs:
      filing_status: single
      adjusted_gross_income: 10000
      tax_liability_before_credits: 800
      persons:
        taxpayer:
          age: 68
          is_tax_unit_head: true
      nontaxable_social_security: 0
    expected:
      sec22_initial_amount: 5000
      sec22_agi_threshold: 7500
      sec22_agi_reduction: 1250  # (10000 - 7500) * 0.5
      adjusted_sec22_amount: 3750  # 5000 - 1250
      sec22_tentative_credit: 562.50  # 3750 * 0.15
    citations:
      - "26 USC 22(d)(2)(A): $7,500 threshold for single"
      - "26 USC 22(d)(2): reduced by one-half of excess"

  - name: "Joint, AGI above threshold"
    description: "Joint AGI $15,000 - excess of $5,000 over $10,000 threshold"
    inputs:
      filing_status: joint
      adjusted_gross_income: 15000
      tax_liability_before_credits: 1500
      persons:
        head:
          age: 68
          is_tax_unit_head: true
        spouse:
          age: 66
          is_tax_unit_spouse: true
      nontaxable_social_security: 0
    expected:
      sec22_initial_amount: 7500
      sec22_agi_threshold: 10000
      sec22_agi_reduction: 2500  # (15000 - 10000) * 0.5
      adjusted_sec22_amount: 5000  # 7500 - 2500
      sec22_tentative_credit: 750  # 5000 * 0.15
    citations:
      - "26 USC 22(d)(2)(B): $10,000 threshold for joint"

  - name: "MFS, AGI above threshold"
    description: "MFS AGI $8,000 - excess of $3,000 over $5,000 threshold"
    inputs:
      filing_status: separate
      adjusted_gross_income: 8000
      tax_liability_before_credits: 500
      persons:
        taxpayer:
          age: 67
          is_tax_unit_head: true
      nontaxable_social_security: 0
    expected:
      sec22_initial_amount: 3750
      sec22_agi_threshold: 5000
      sec22_agi_reduction: 1500  # (8000 - 5000) * 0.5
      adjusted_sec22_amount: 2250  # 3750 - 1500
      sec22_tentative_credit: 337.50  # 2250 * 0.15
    citations:
      - "26 USC 22(d)(2)(C): $5,000 threshold for MFS"

  # ============================================================================
  # Combined Reductions (Social Security + AGI)
  # ============================================================================

  - name: "Both reductions apply"
    description: "Social Security AND AGI reduction together"
    inputs:
      filing_status: single
      adjusted_gross_income: 12000
      tax_liability_before_credits: 500
      persons:
        taxpayer:
          age: 68
          is_tax_unit_head: true
      nontaxable_social_security: 2000
    expected:
      sec22_initial_amount: 5000
      sec22_nontaxable_reduction: 2000
      sec22_agi_threshold: 7500
      sec22_agi_reduction: 2250  # (12000 - 7500) * 0.5
      # After nontaxable: 5000 - 2000 = 3000
      # After AGI: 3000 - 2250 = 750
      adjusted_sec22_amount: 750
      sec22_tentative_credit: 112.50  # 750 * 0.15
    citations:
      - "26 USC 22(d): both reductions apply sequentially"

  - name: "Both reductions fully phase out credit"
    description: "Combined reductions exceed initial amount"
    inputs:
      filing_status: single
      adjusted_gross_income: 20000
      tax_liability_before_credits: 1000
      persons:
        taxpayer:
          age: 70
          is_tax_unit_head: true
      nontaxable_social_security: 3000
    expected:
      sec22_initial_amount: 5000
      sec22_nontaxable_reduction: 3000
      sec22_agi_reduction: 6250  # (20000 - 7500) * 0.5
      # After nontaxable: 5000 - 3000 = 2000
      # After AGI: max(0, 2000 - 6250) = 0
      adjusted_sec22_amount: 0
      elderly_disabled_credit: 0
    citations:
      - "26 USC 22(d): reductions can eliminate credit entirely"

  # ============================================================================
  # Tax Liability Limitation
  # ============================================================================

  - name: "Credit limited by tax liability"
    description: "Nonrefundable credit cannot exceed tax liability"
    inputs:
      filing_status: single
      adjusted_gross_income: 5000
      tax_liability_before_credits: 200
      persons:
        taxpayer:
          age: 68
          is_tax_unit_head: true
      nontaxable_social_security: 0
    expected:
      sec22_tentative_credit: 750  # 5000 * 0.15
      elderly_disabled_credit: 200  # Limited to tax liability
    citations:
      - "26 USC 22(a): credit against tax (nonrefundable)"

  - name: "Zero tax liability - no credit"
    description: "With $0 tax liability, nonrefundable credit is $0"
    inputs:
      filing_status: single
      adjusted_gross_income: 5000
      tax_liability_before_credits: 0
      persons:
        taxpayer:
          age: 68
          is_tax_unit_head: true
      nontaxable_social_security: 0
    expected:
      sec22_tentative_credit: 750
      elderly_disabled_credit: 0  # No tax liability to offset
    citations:
      - "26 USC 22: nonrefundable credit"

  # ============================================================================
  # Edge Cases
  # ============================================================================

  - name: "Age exactly 65"
    description: "Person who turns 65 before year end qualifies"
    inputs:
      filing_status: single
      adjusted_gross_income: 5000
      tax_liability_before_credits: 500
      persons:
        taxpayer:
          age: 65
          is_tax_unit_head: true
      nontaxable_social_security: 0
    expected:
      is_sec22_qualified_individual:
        taxpayer: true
      num_sec22_qualified_individuals: 1
      elderly_disabled_credit: 500
    citations:
      - "26 USC 22(e)(1)(A): attained age 65 before close of taxable year"

  - name: "Age 64 at year end - not qualified"
    description: "Must be 65 by year end"
    inputs:
      filing_status: single
      adjusted_gross_income: 5000
      tax_liability_before_credits: 500
      persons:
        taxpayer:
          age: 64
          is_tax_unit_head: true
          is_permanently_disabled: false
      nontaxable_social_security: 0
    expected:
      is_sec22_qualified_individual:
        taxpayer: false
      num_sec22_qualified_individuals: 0
      elderly_disabled_credit: 0
    citations:
      - "26 USC 22(e)(1): must be 65+ or permanently disabled"

  - name: "Head of household elderly"
    description: "Head of household uses single amounts and thresholds"
    inputs:
      filing_status: head_of_household
      adjusted_gross_income: 9000
      tax_liability_before_credits: 600
      persons:
        taxpayer:
          age: 68
          is_tax_unit_head: true
      nontaxable_social_security: 0
    expected:
      sec22_initial_amount: 5000
      sec22_agi_threshold: 7500
      sec22_agi_reduction: 750  # (9000 - 7500) * 0.5
      adjusted_sec22_amount: 4250
      sec22_tentative_credit: 637.50
      elderly_disabled_credit: 600  # Limited by liability
    citations:
      - "26 USC 22(c)(1)(A)(iii): head of household gets $5,000"
      - "26 USC 22(d)(2)(A): $7,500 AGI threshold for head of household"

  - name: "Joint elderly with one disabled spouse"
    description: "65+ spouse and disabled under-65 spouse both qualify"
    inputs:
      filing_status: joint
      adjusted_gross_income: 8000
      tax_liability_before_credits: 1200
      persons:
        head:
          age: 67
          is_tax_unit_head: true
        spouse:
          age: 58
          is_tax_unit_spouse: true
          is_permanently_disabled: true
      nontaxable_social_security: 0
    expected:
      is_sec22_qualified_individual:
        head: true
        spouse: true  # Disabled qualifies
      num_sec22_qualified_individuals: 2
      sec22_initial_amount: 7500  # Both qualified
      sec22_tentative_credit: 1125
    citations:
      - "26 USC 22(c)(1)(B): $7,500 when both qualified"
      - "26 USC 22(e)(1)(B): disabled under 65 qualifies"
