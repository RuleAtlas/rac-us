architecture:
  description: |
    Section 469 limits the deduction of losses from passive activities.
    This is one of the most complex tax provisions, designed to prevent
    high-income taxpayers from sheltering income using "tax shelters."

    CORE CONCEPTS:

    1. PASSIVE ACTIVITY (469(c))
       - Trade or business without material participation
       - Rental activities (presumed passive with exceptions)

    2. PASSIVE ACTIVITY LOSS (469(d))
       - Aggregate losses from passive activities MINUS
       - Aggregate income from passive activities

    3. DISALLOWANCE RULE (469(a))
       - Passive losses can ONLY offset passive income
       - Excess losses are suspended and carried forward

    4. RENTAL REAL ESTATE EXCEPTION (469(i))
       - Up to $25,000 of rental losses allowed for active participants
       - Phaseout: 50% of (AGI - $100,000)
       - Fully phased out at $150,000 AGI

    5. REAL ESTATE PROFESSIONAL EXCEPTION (469(c)(7))
       - 750+ hours in real property trades/businesses
       - More than 50% of services in real property businesses
       - Rental activities treated as non-passive

  formula_structure: |
    Main calculation:
    passive_activity_loss =
      max(0, aggregate_passive_losses - aggregate_passive_income)

    allowable_deduction =
      passive_income_offset +
      min(excess_loss, rental_real_estate_allowance)

    rental_real_estate_allowance =
      max(0, $25,000 - 50% * max(0, AGI - $100,000))

    suspended_loss = passive_activity_loss - allowable_deduction

  key_variables:
    - gross_passive_activity_loss
    - net_passive_activity_income
    - allowable_passive_activity_loss_deduction
    - disallowed_passive_activity_loss
    - suspended_passive_losses
    - rental_real_estate_loss_allowance
    - is_real_estate_professional

  limitations:
    - Material participation is simplified to input flag
    - Activity-level tracking not fully implemented
    - Credits are simplified (full implementation requires tax allocation)
    - At-risk rules (Section 465) not included
    - Grouping elections not modeled
