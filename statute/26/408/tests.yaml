# Tests for 26 USC Section 408 - Individual Retirement Accounts
#
# Test categories:
# 1. Traditional IRA contribution limits
# 2. Traditional IRA distribution taxation
# 3. Roth IRA contribution limits and phase-out
# 4. Roth IRA qualified vs non-qualified distributions
# 5. Early withdrawal penalty and exceptions
# 6. Rollover rules

tax_year: 2024

test_cases:
  # ============================================================================
  # Traditional IRA Contribution Limits - 219(b)
  # ============================================================================

  - name: "Under 50, full contribution"
    description: "Individual under 50 can contribute up to $7,000"
    variable: ira_contribution_limit
    inputs:
      age: 35
      earned_income: 100000
    expected:
      ira_base_contribution_limit: 7000
      ira_catchup_amount: 0
      ira_contribution_limit: 7000
    citations:
      - "26 USC 219(b)(1)(A): $7,000 for 2024"

  - name: "Age 50+, catch-up allowed"
    description: "Individual 50+ can contribute additional $1,000"
    variable: ira_contribution_limit
    inputs:
      age: 55
      earned_income: 80000
    expected:
      ira_base_contribution_limit: 7000
      ira_catchup_amount: 1000
      ira_contribution_limit: 8000
    citations:
      - "26 USC 219(b)(5)(B): additional $1,000 for age 50+"

  - name: "Low earned income limits contribution"
    description: "IRA contribution cannot exceed compensation"
    variable: ira_contribution_limit
    inputs:
      age: 30
      earned_income: 3000
    expected:
      ira_compensation_limit: 3000
      ira_contribution_limit: 3000
    citations:
      - "26 USC 219(b)(1)(B): cannot exceed compensation"

  - name: "Excess contribution calculated"
    description: "Contributions over limit are excess"
    variable: excess_ira_contributions
    inputs:
      age: 40
      earned_income: 50000
      traditional_ira_contributions: 10000
      roth_ira_contributions: 0
    expected:
      ira_contribution_limit: 7000
      total_ira_contributions: 10000
      excess_ira_contributions: 3000
    citations:
      - "26 USC 4973: 6% excise tax on excess contributions"

  # ============================================================================
  # Traditional IRA Distribution Taxation - 408(d)
  # ============================================================================

  - name: "Traditional IRA distribution - fully taxable"
    description: "Distribution from IRA with no basis is fully taxable"
    variable: taxable_ira_distribution
    inputs:
      age: 65
      traditional_ira_distribution: 25000
      traditional_ira_basis: 0
      traditional_ira_total_value: 200000
    expected:
      taxable_ira_distribution: 25000
      ira_early_withdrawal_penalty: 0
    citations:
      - "26 USC 408(d)(1): included in gross income"

  - name: "Traditional IRA with basis - pro-rata rule"
    description: "Distribution with nondeductible basis uses pro-rata taxation"
    variable: taxable_ira_distribution
    inputs:
      age: 62
      traditional_ira_distribution: 20000
      traditional_ira_basis: 40000  # 20% of total value is basis
      traditional_ira_total_value: 180000  # After distribution: 180000 + 20000 = 200000 total
    expected:
      # Non-taxable ratio: 40000 / (180000 + 20000) = 40000 / 200000 = 0.20
      # Non-taxable amount: 20000 * 0.20 = 4000
      # Taxable: 20000 - 4000 = 16000
      taxable_ira_distribution: 16000
      ira_basis_recovery: 4000
    citations:
      - "26 USC 408(d)(1): pro-rata recovery of basis"
      - "Form 8606 instructions"

  - name: "Traditional IRA early distribution - penalty applies"
    description: "Distribution before 59.5 subject to 10% penalty"
    variable: ira_early_withdrawal_penalty
    inputs:
      age: 45
      traditional_ira_distribution: 15000
      traditional_ira_basis: 0
      traditional_ira_total_value: 100000
    expected:
      taxable_ira_distribution: 15000
      is_ira_early_withdrawal_penalty_applies: true
      ira_early_withdrawal_penalty: 1500
    citations:
      - "26 USC 72(t)(1): 10% additional tax"

  # ============================================================================
  # IRA Early Withdrawal Exceptions - 72(t)(2)
  # ============================================================================

  - name: "First-time homebuyer exception"
    description: "Up to $10,000 exempt for first home purchase"
    variable: ira_early_withdrawal_penalty
    inputs:
      age: 32
      traditional_ira_distribution: 15000
      traditional_ira_basis: 0
      first_home_distribution: 10000
    expected:
      taxable_ira_distribution: 15000
      first_home_exemption: 10000
      ira_amount_subject_to_penalty: 5000
      ira_early_withdrawal_penalty: 500
    citations:
      - "26 USC 72(t)(2)(F): first-time homebuyer $10,000 limit"

  - name: "Higher education exception"
    description: "Education expenses exempt from penalty"
    variable: ira_early_withdrawal_penalty
    inputs:
      age: 40
      traditional_ira_distribution: 20000
      traditional_ira_basis: 0
      education_distribution: 20000
    expected:
      taxable_ira_distribution: 20000
      ira_amount_subject_to_penalty: 0
      ira_early_withdrawal_penalty: 0
    citations:
      - "26 USC 72(t)(2)(E): qualified higher education expenses"

  - name: "Health insurance during unemployment"
    description: "Health premiums exempt during unemployment"
    variable: ira_early_withdrawal_penalty
    inputs:
      age: 52
      traditional_ira_distribution: 8000
      traditional_ira_basis: 0
      health_insurance_distribution: 8000
    expected:
      taxable_ira_distribution: 8000
      ira_amount_subject_to_penalty: 0
      ira_early_withdrawal_penalty: 0
    citations:
      - "26 USC 72(t)(2)(D): health insurance premiums during unemployment"

  # ============================================================================
  # Roth IRA Contribution Phase-Out - 408A(c)(3)
  # ============================================================================

  - name: "Roth IRA - single below phase-out"
    description: "Single filer under $146,000 can contribute full amount"
    variable: roth_ira_contribution_limit
    inputs:
      age: 35
      filing_status: single
      adjusted_gross_income: 100000
      earned_income: 100000
    expected:
      roth_ira_contribution_limit: 7000
    citations:
      - "26 USC 408A(c)(3): 2024 phase-out starts at $146,000"

  - name: "Roth IRA - single in phase-out range"
    description: "Single filer at $153,500 (halfway) gets partial limit"
    variable: roth_ira_contribution_limit
    inputs:
      age: 40
      filing_status: single
      adjusted_gross_income: 153500  # Halfway between 146000 and 161000
      earned_income: 153500
    expected:
      # Reduction: (153500 - 146000) / (161000 - 146000) = 7500 / 15000 = 0.5
      # Limit: 7000 * (1 - 0.5) = 3500
      roth_ira_contribution_limit: 3500
    citations:
      - "26 USC 408A(c)(3): pro-rata phase-out"

  - name: "Roth IRA - single above phase-out"
    description: "Single filer over $161,000 cannot contribute"
    variable: roth_ira_contribution_limit
    inputs:
      age: 45
      filing_status: single
      adjusted_gross_income: 170000
      earned_income: 170000
    expected:
      roth_ira_contribution_limit: 0
    citations:
      - "26 USC 408A(c)(3): no contribution above $161,000"

  - name: "Roth IRA - MFJ below phase-out"
    description: "Joint filers under $230,000 can contribute full amount"
    variable: roth_ira_contribution_limit
    inputs:
      age: 50
      filing_status: joint
      adjusted_gross_income: 200000
      earned_income: 200000
    expected:
      roth_ira_contribution_limit: 8000  # Includes catch-up
    citations:
      - "26 USC 408A(c)(3): 2024 MFJ phase-out starts at $230,000"

  - name: "Roth IRA - MFJ above phase-out"
    description: "Joint filers over $240,000 cannot contribute"
    variable: roth_ira_contribution_limit
    inputs:
      age: 45
      filing_status: joint
      adjusted_gross_income: 250000
      earned_income: 250000
    expected:
      roth_ira_contribution_limit: 0
    citations:
      - "26 USC 408A(c)(3): no contribution above $240,000"

  - name: "Roth IRA - MFS very limited"
    description: "MFS filers have $0-$10,000 phase-out range"
    variable: roth_ira_contribution_limit
    inputs:
      age: 40
      filing_status: separate
      adjusted_gross_income: 5000
      earned_income: 5000
    expected:
      # Phase-out at $5000: (5000 - 0) / (10000 - 0) = 0.5
      # Limit: 5000 (capped by compensation)
      roth_ira_contribution_limit: 2500  # min of phase-out limit and compensation limit
    citations:
      - "26 USC 408A(c)(3)(B): MFS very narrow phase-out"

  # ============================================================================
  # Roth IRA Distributions - 408A(d)
  # ============================================================================

  - name: "Roth qualified distribution - tax-free"
    description: "Distribution after 5 years and age 59.5 is tax-free"
    variable: taxable_roth_distribution
    inputs:
      age: 62
      roth_ira_distribution: 50000
      roth_ira_contribution_basis: 30000
      roth_ira_conversion_basis: 0
      is_roth_ira_5_year_satisfied: true
    expected:
      is_roth_qualified_distribution: true
      taxable_roth_distribution: 0
      roth_early_withdrawal_penalty: 0
    citations:
      - "26 USC 408A(d)(1): qualified distribution not includible"

  - name: "Roth non-qualified - contributions only"
    description: "Distribution within contribution basis is tax-free"
    variable: taxable_roth_distribution
    inputs:
      age: 45
      roth_ira_distribution: 20000
      roth_ira_contribution_basis: 30000
      roth_ira_conversion_basis: 0
      is_roth_ira_5_year_satisfied: false
    expected:
      is_roth_qualified_distribution: false
      taxable_roth_distribution: 0  # Within contribution basis
      roth_early_withdrawal_penalty: 0  # Contributions always penalty-free
    citations:
      - "26 USC 408A(d)(4): ordering rules - contributions first"

  - name: "Roth non-qualified - earnings taxable"
    description: "Earnings before 59.5 are taxable and penalized"
    variable: taxable_roth_distribution
    inputs:
      age: 50
      roth_ira_distribution: 40000
      roth_ira_contribution_basis: 25000
      roth_ira_conversion_basis: 0
      is_roth_ira_5_year_satisfied: true
    expected:
      is_roth_qualified_distribution: false  # Not 59.5 yet
      roth_ira_earnings_distributed: 15000  # 40000 - 25000
      taxable_roth_distribution: 15000
      is_roth_early_penalty_applies: true
      roth_early_withdrawal_penalty: 1500
    citations:
      - "26 USC 408A(d)(2): must be 59.5+ for qualified distribution"
      - "26 USC 72(t)(1): 10% penalty on earnings"

  - name: "Roth 5-year not satisfied but 60+ years old"
    description: "Must satisfy both 5-year AND age/exception for qualified"
    variable: taxable_roth_distribution
    inputs:
      age: 62
      roth_ira_distribution: 15000
      roth_ira_contribution_basis: 10000
      roth_ira_conversion_basis: 0
      is_roth_ira_5_year_satisfied: false  # Started Roth recently
    expected:
      is_roth_qualified_distribution: false  # 5-year not met
      taxable_roth_distribution: 5000  # Earnings portion
      roth_early_withdrawal_penalty: 0  # Age 60+ exception to penalty
    citations:
      - "26 USC 408A(d)(2)(B): 5-year requirement is separate"

  - name: "Roth death distribution - qualified"
    description: "Beneficiary distribution is qualified if 5-year met"
    variable: taxable_roth_distribution
    inputs:
      age: 45
      roth_ira_distribution: 100000
      roth_ira_contribution_basis: 50000
      roth_ira_conversion_basis: 0
      is_roth_ira_5_year_satisfied: true
      is_roth_death_distribution: true
    expected:
      is_roth_qualified_distribution: true
      taxable_roth_distribution: 0
      roth_early_withdrawal_penalty: 0
    citations:
      - "26 USC 408A(d)(2)(A)(ii): death exception"

  - name: "Roth first-home distribution - qualified"
    description: "First-time homebuyer distribution qualifies"
    variable: taxable_roth_distribution
    inputs:
      age: 30
      roth_ira_distribution: 10000
      roth_ira_contribution_basis: 5000
      roth_ira_conversion_basis: 0
      is_roth_ira_5_year_satisfied: true
      roth_first_home_distribution: 10000
    expected:
      is_roth_qualified_distribution: true
      taxable_roth_distribution: 0
      roth_early_withdrawal_penalty: 0
    citations:
      - "26 USC 408A(d)(2)(A)(iv): qualified special purpose"

  # ============================================================================
  # IRA Rollovers - 408(d)(3)
  # ============================================================================

  - name: "Direct trustee transfer - not taxable"
    description: "Trustee-to-trustee transfer is not a taxable event"
    variable: net_ira_distribution_after_rollover
    inputs:
      age: 45
      traditional_ira_distribution: 100000
      is_ira_direct_transfer: true
    expected:
      net_ira_distribution_after_rollover: 0
    citations:
      - "26 USC 408(d)(3): trustee-to-trustee not subject to 60-day rule"

  - name: "60-day rollover - successful"
    description: "Amount rolled over within 60 days is not taxable"
    variable: net_ira_distribution_after_rollover
    inputs:
      age: 55
      traditional_ira_distribution: 50000
      ira_rollover_amount: 50000
      is_ira_direct_transfer: false
      has_prior_12_month_rollover: false
    expected:
      is_rollover_permitted: true
      valid_ira_rollover: 50000
      net_ira_distribution_after_rollover: 0
    citations:
      - "26 USC 408(d)(3)(A)(i): 60-day rollover period"

  - name: "60-day rollover - one-per-year violated"
    description: "Second 60-day rollover within 12 months fails"
    variable: net_ira_distribution_after_rollover
    inputs:
      age: 50
      traditional_ira_distribution: 30000
      ira_rollover_amount: 30000
      is_ira_direct_transfer: false
      has_prior_12_month_rollover: true
    expected:
      is_rollover_permitted: false
      valid_ira_rollover: 0
      failed_ira_rollover: 30000
      net_ira_distribution_after_rollover: 30000
    citations:
      - "26 USC 408(d)(3)(B): one-rollover-per-year limitation"

  - name: "Partial rollover"
    description: "Only portion rolled over is tax-free"
    variable: net_ira_distribution_after_rollover
    inputs:
      age: 58
      traditional_ira_distribution: 80000
      ira_rollover_amount: 60000
      is_ira_direct_transfer: false
      has_prior_12_month_rollover: false
    expected:
      valid_ira_rollover: 60000
      net_ira_distribution_after_rollover: 20000
    citations:
      - "26 USC 408(d)(3)(A)(i): portion rolled over"

  # ============================================================================
  # Combined Scenarios
  # ============================================================================

  - name: "Traditional and Roth distributions same year"
    description: "Both types distributed, different tax treatment"
    variable: total_ira_taxable_income
    inputs:
      age: 63
      traditional_ira_distribution: 30000
      traditional_ira_basis: 5000
      traditional_ira_total_value: 145000
      roth_ira_distribution: 20000
      roth_ira_contribution_basis: 15000
      is_roth_ira_5_year_satisfied: true
    expected:
      # Traditional: 30000 - (30000 * 5000/175000) = 30000 - 857 = 29143 taxable
      taxable_ira_distribution: 29143
      # Roth: qualified, so 0 taxable
      taxable_roth_distribution: 0
      total_ira_taxable_income: 29143
    citations:
      - "Different treatment for traditional vs Roth"

  - name: "Age 58 with multiple exceptions"
    description: "Early distribution with partial exceptions"
    variable: ira_early_withdrawal_penalty
    inputs:
      age: 58
      traditional_ira_distribution: 25000
      traditional_ira_basis: 0
      first_home_distribution: 10000
      education_distribution: 5000
    expected:
      taxable_ira_distribution: 25000
      first_home_exemption: 10000
      # Education: 5000 fully exempt
      # Subject to penalty: 25000 - 10000 - 5000 = 10000
      ira_amount_subject_to_penalty: 10000
      ira_early_withdrawal_penalty: 1000
    citations:
      - "Multiple 72(t)(2) exceptions can apply"
