# 26 USC 3101(a) - Employee Social Security Tax Tests
#
# Test cases for validating employee Social Security (OASDI) tax implementation.
# Covers:
# - Basic tax calculation (6.2% of wages)
# - Wage base cap ($168,600 in 2024)
# - Wages above and below cap
# - Edge cases
#
# Key statutes:
# - 26 USC 3101(a): Employee OASDI rate (6.2%)
# - 26 USC 3121(a): Definition of wages
# - Rev. Proc. 2023-34: 2024 wage base ($168,600)

reference: "26 USC 3101(a)"
tax_year: 2024

# =============================================================================
# BASIC SOCIAL SECURITY TAX TESTS
# =============================================================================

tests:
  # Test 1: Basic SS tax - below wage base
  - name: "Employee SS tax - typical W-2 wages below cap"
    description: "6.2% of all wages when below $168,600 cap"
    inputs:
      person:
        irs_employment_income: 50000
    expected:
      employee_social_security_tax: 3100  # $50,000 * 6.2% = $3,100
    citations:
      - "26 USC 3101(a): 6.2% of wages"

  # Test 2: Wages exactly at wage base
  - name: "Employee SS tax - wages at wage base cap"
    description: "Wages exactly at $168,600 cap"
    inputs:
      person:
        irs_employment_income: 168600
    expected:
      employee_social_security_tax: 10453.20  # $168,600 * 6.2% = $10,453.20
    citations:
      - "26 USC 3101(a): 6.2% of wages up to wage base"
      - "Rev. Proc. 2023-34: 2024 wage base $168,600"

  # Test 3: Wages above wage base - capped
  - name: "Employee SS tax - wages above wage base (capped)"
    description: "Tax capped at wage base even when wages exceed it"
    inputs:
      person:
        irs_employment_income: 200000
    expected:
      # Tax only on $168,600, not on $200,000
      employee_social_security_tax: 10453.20  # $168,600 * 6.2% = $10,453.20
    citations:
      - "26 USC 3101(a): wages subject to cap"
      - "Rev. Proc. 2023-34: wage base $168,600"

  # Test 4: High earner - far above cap
  - name: "Employee SS tax - high earner ($500k)"
    description: "Millionaire still pays max SS tax of $10,453.20"
    inputs:
      person:
        irs_employment_income: 500000
    expected:
      employee_social_security_tax: 10453.20  # Max = $168,600 * 6.2%
    citations:
      - "26 USC 3101(a): capped at wage base"

  # Test 5: Zero income
  - name: "Employee SS tax - zero income"
    inputs:
      person:
        irs_employment_income: 0
    expected:
      employee_social_security_tax: 0
    citations:
      - "26 USC 3101(a): tax on wages received"

  # Test 6: Small income
  - name: "Employee SS tax - part-time worker"
    description: "Low income worker still pays 6.2%"
    inputs:
      person:
        irs_employment_income: 15000
    expected:
      employee_social_security_tax: 930  # $15,000 * 6.2% = $930
    citations:
      - "26 USC 3101(a): 6.2% of wages"

  # Test 7: Just under wage base
  - name: "Employee SS tax - just under wage base"
    description: "$1 under the cap"
    inputs:
      person:
        irs_employment_income: 168599
    expected:
      employee_social_security_tax: 10453.1378  # $168,599 * 6.2%
    citations:
      - "26 USC 3101(a): full 6.2% below cap"

  # Test 8: Just over wage base
  - name: "Employee SS tax - $1 over wage base"
    description: "Extra $1 above cap is not taxed"
    inputs:
      person:
        irs_employment_income: 168601
    expected:
      # Only $168,600 is taxable, not $168,601
      employee_social_security_tax: 10453.20  # $168,600 * 6.2%
    citations:
      - "26 USC 3101(a): capped at wage base"

# =============================================================================
# COMBINED FICA TAX TESTS
# =============================================================================

  # Test 9: Combined FICA - below cap
  - name: "Employee FICA tax - combined SS + Medicare below cap"
    description: "7.65% combined rate (6.2% + 1.45%)"
    inputs:
      person:
        irs_employment_income: 50000
    expected:
      employee_social_security_tax: 3100   # $50,000 * 6.2%
      employee_medicare_tax: 725           # $50,000 * 1.45%
      employee_fica_tax: 3825              # $50,000 * 7.65%
    citations:
      - "26 USC 3101(a): SS at 6.2%"
      - "26 USC 3101(b)(1): Medicare at 1.45%"

  # Test 10: Combined FICA - above cap
  - name: "Employee FICA tax - wages above SS cap"
    description: "SS capped, Medicare continues on all wages"
    inputs:
      person:
        irs_employment_income: 200000
    expected:
      employee_social_security_tax: 10453.20  # Capped at $168,600 * 6.2%
      employee_medicare_tax: 2900             # $200,000 * 1.45%
      employee_fica_tax: 13353.20             # $10,453.20 + $2,900
    citations:
      - "26 USC 3101(a): SS capped at wage base"
      - "26 USC 3101(b): Medicare has no cap"

# =============================================================================
# EMPLOYER MATCHING TESTS
# =============================================================================

  # Test 11: Employer SS matches employee
  - name: "Employer SS tax matches employee"
    description: "Employer pays same 6.2% as employee"
    inputs:
      person:
        irs_employment_income: 100000
    expected:
      employee_social_security_tax: 6200   # $100,000 * 6.2%
      employer_social_security_tax: 6200   # Matching 6.2%
    citations:
      - "26 USC 3101(a): employee rate"
      - "26 USC 3111(a): employer rate (matching)"

  # Test 12: Employer SS also capped at wage base
  - name: "Employer SS tax also capped"
    description: "Employer SS cap matches employee"
    inputs:
      person:
        irs_employment_income: 250000
    expected:
      employee_social_security_tax: 10453.20  # Capped
      employer_social_security_tax: 10453.20  # Also capped
      # Total SS tax: $20,906.40 (employee + employer)
    citations:
      - "26 USC 3111(a): employer rate capped at wage base"
