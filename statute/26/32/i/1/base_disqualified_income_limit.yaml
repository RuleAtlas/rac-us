# 26 USC §32(i)(1) - Disqualified Income Limit
#
# "No credit shall be allowed under subsection (a) for the taxable year if
# the aggregate amount of disqualified income of the taxpayer for the taxable
# year exceeds $10,000."
#
# This is the STATUTORY BASE AMOUNT as written in the law.
# Subject to inflation adjustment per §32(j)(1)(A)(iii) with base year 2020.

reference: "26 USC § 32(i)(1)"
inflation_adjustment:
  section: "§32(j)(1)(A)(iii)"
  base_year: 2020

disqualified_income_limit: 10000
