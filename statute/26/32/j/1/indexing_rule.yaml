# 26 USC §32(j)(1) - Cost-of-Living Adjustments
#
# "(A) IN GENERAL.—In the case of any taxable year beginning after 2015
# (2021 in the case of the dollar amount in subsection (i)(1)), each of
# the dollar amounts in subsections (b)(2) and (i)(1) shall be increased
# by an amount equal to—
#   (i) such dollar amount, multiplied by
#   (ii) the cost-of-living adjustment determined under section 1(f)(3)
#        for the calendar year in which the taxable year begins,
#        determined by substituting in subparagraph (A)(ii) thereof—
#          (i) in the case of amounts in subsection (b)(2)(A),
#              'calendar year 1995' for 'calendar year 2016',
#          (ii) in the case of the $5,000 amount in subsection (b)(2)(B),
#              'calendar year 2008' for 'calendar year 2016', and
#          (iii) in the case of the $10,000 amount in subsection (i)(1),
#              'calendar year 2020' for 'calendar year 2016'."

reference: "26 USC § 32(j)(1)"
description: EITC cost-of-living adjustment

# CPI adjustments per subsection
adjustments:
  # §32(b)(2)(A) - Earned income and phaseout amounts
  b_2_A:
    reference: "26 USC § 32(j)(1)(B)(i)"
    base_year: 1995
    applies_to:
      - statute/26/32/b/2/A/base_amounts.yaml#earned_income_amount
      - statute/26/32/b/2/A/base_amounts.yaml#phaseout_amount
    rounding: statute/26/32/j/2/rounding_rules.yaml#A  # Nearest $10
    effective_from: 2016-01-01  # "taxable years beginning after 2015"

  # §32(b)(2)(B) - Joint return adjustment
  b_2_B:
    reference: "26 USC § 32(j)(1)(B)(ii)"
    base_year: 2008
    applies_to:
      - statute/26/32/b/2/B/base_joint_return_adjustment.yaml#joint_return_adjustment
    rounding: statute/26/32/j/2/rounding_rules.yaml#A  # Nearest $10
    effective_from: 2016-01-01

  # §32(i)(1) - Disqualified income limit
  i_1:
    reference: "26 USC § 32(j)(1)(B)(iii)"
    base_year: 2020
    applies_to:
      - statute/26/32/i/1/base_disqualified_income_limit.yaml#disqualified_income_limit
    rounding: statute/26/32/j/2/rounding_rules.yaml#B  # Nearest $50
    effective_from: 2022-01-01  # "taxable years beginning after 2021"

# Method reference
method:
  type: cost_of_living_adjustment
  reference: "26 USC § 1(f)(3)"
  index: chained_cpi_u  # C-CPI-U per TCJA
