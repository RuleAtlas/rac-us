# 26 USC 32 - Earned Income Tax Credit (EITC)
# Metadata and coverage documentation

title: "Earned Income Tax Credit"
section: "26 USC 32"
short_title: "EITC"

sources:
  statute:
    - title: "26 U.S. Code 32 - Earned income"
      href: "https://www.law.cornell.edu/uscode/text/26/32"
  irs_guidance:
    - title: "Rev. Proc. 2023-34 (2024 inflation adjustments)"
      href: "https://www.irs.gov/irb/2023-48_IRB#REV-PROC-2023-34"
    - title: "Publication 596 - Earned Income Credit"
      href: "https://www.irs.gov/pub/irs-pdf/p596.pdf"
    - title: "IRS EITC Tables"
