# 26 USC Section 1411 - Net Investment Income Tax Parameters
#
# The Net Investment Income Tax (NIIT) was enacted as part of the Health Care
# and Education Reconciliation Act of 2010 (HCERA), effective for tax years
# beginning after December 31, 2012.
#
# The thresholds are NOT indexed for inflation per the statute.
#
# Reference: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title26-section1411

description: "Net Investment Income Tax parameters under IRC Section 1411"
reference: "26 USC 1411"

# =============================================================================
# Section 1411(a)(1) - Tax Rate
# =============================================================================
rate:
  description: "Net Investment Income Tax rate"
  unit: rate
  values:
    - date: 2013-01-01
      value: 0.038
      reference: "26 USC 1411(a)(1) - 3.8 percent"

# =============================================================================
# Section 1411(b) - Threshold Amounts
# =============================================================================
# These thresholds are NOT indexed for inflation. They have remained constant
# since the NIIT took effect in 2013.
#
# Note: Some proposals (e.g., Build Back Better) have proposed lowering these
# thresholds. If enacted, additional dated values would be added here.

threshold:
  description: "MAGI thresholds above which NIIT applies"

  # Section 1411(b)(1): Joint return or surviving spouse
  joint:
    description: "MAGI threshold for married filing jointly or surviving spouse"
    unit: USD
    values:
      - date: 2013-01-01
        value: 250000
        reference: "26 USC 1411(b)(1) - $250,000 for joint returns"

  # Section 1411(b)(2): Married filing separately
  # Explicitly stated as "one-half of the dollar amount determined under paragraph (1)"
  separate:
    description: "MAGI threshold for married filing separately"
    unit: USD
    values:
      - date: 2013-01-01
        value: 125000
        reference: "26 USC 1411(b)(2) - half of joint threshold"

  # Section 1411(b)(3): Any other case (single, head of household)
  other:
    description: "MAGI threshold for single filers and head of household"
    unit: USD
    values:
      - date: 2013-01-01
        value: 200000
        reference: "26 USC 1411(b)(3) - $200,000 for single/HOH"

# =============================================================================
# Section 1411(c)(1)(A) - Net Investment Income Components
# =============================================================================
# Documentation of what constitutes net investment income for reference.
# These are not parameters but serve as a specification.

income_components:
  description: "Types of income included in net investment income per 1411(c)(1)(A)"

  included:
    - interest           # 1411(c)(1)(A)(i) - taxable interest only
    - dividends          # 1411(c)(1)(A)(i) - qualified and ordinary
    - annuities          # 1411(c)(1)(A)(i) - non-qualified distributions
    - royalties          # 1411(c)(1)(A)(i)
    - rents              # 1411(c)(1)(A)(i) - net rental income
    - capital_gains      # 1411(c)(1)(A)(iii) - net gain from property
    - passive_income     # 1411(c)(2) - passive activity income

  excluded:
    - wages                        # Active income - not investment income
    - self_employment_income       # Active income - Section 1411(c)(6)
    - social_security              # Excluded from gross income for NIIT
    - tax_exempt_interest          # Section 103 municipal bond interest
    - qualified_plan_distributions # 401(k), IRA distributions (separate from annuities)
    - alimony                      # Not investment income
    - unemployment_compensation    # Not investment income
    - active_business_income       # Non-passive trade/business income
