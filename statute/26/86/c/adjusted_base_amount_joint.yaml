# 26 USC Section 86(c)(2)(B) - Adjusted Base Amount for Joint Filers
#
# "(c) Base amount and adjusted base amount defined
#  For purposes of this section-
#  ...
#  (2) Adjusted base amount - The term "adjusted base amount" means-
#   ...
#   (B) $44,000, in the case of a joint return..."
#
# When combined income exceeds this amount, up to 85% of benefits become taxable.
# Applies to: Married Filing Jointly, Qualifying Widow(er)

description: "The IRS taxes Social Security benefits at the higher 85% rate for joint filers with combined income above this threshold."

values:
  1984-01-01: 44000

metadata:
  unit: currency-USD
  period: year
  label: "Social Security taxability adjusted base threshold (joint)"
  reference:
