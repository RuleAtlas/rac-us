# 26 USC Section 86(c)(1)(B) - Base Amount for Joint Filers
#
# "(c) Base amount and adjusted base amount defined
#  For purposes of this section-
#  (1) Base amount - The term "base amount" means-
#   ...
#   (B) $32,000, in the case of a joint return..."
#
# Applies to: Married Filing Jointly, Qualifying Widow(er)

description: "The IRS taxes Social Security benefits for joint filers with combined income above this threshold."

