# Tests for 26 USC 25B - Saver's Credit
# Reference: IRS Form 8880 Instructions

# --- Single Filer Tests ---

- name: Single filer with 50% rate
  description: Single filer with AGI under $23,000 gets 50% credit rate
  period: 2024
  input:
    filing_status: SINGLE
    adjusted_gross_income: 20000
    elective_deferrals: 1000
    traditional_ira_contributions: 500
    roth_ira_contributions: 0
    age: 25
    is_tax_unit_dependent: False
    is_full_time_student: False
    tax_liability_before_credits: 1500
  output:
    savers_credit_qualified_contributions: 1500
    savers_credit_eligible_contributions: 1500
    savers_credit_applicable_percentage: 0.50
    savers_credit_tentative: 750
    savers_credit: 750

- name: Single filer with 20% rate
  description: Single filer with AGI between $23,001 and $25,000 gets 20% rate
  period: 2024
  input:
    filing_status: SINGLE
    adjusted_gross_income: 24000
    elective_deferrals: 2000
    traditional_ira_contributions: 0
    roth_ira_contributions: 0
    age: 30
    is_tax_unit_dependent: False
    is_full_time_student: False
    tax_liability_before_credits: 2000
  output:
    savers_credit_applicable_percentage: 0.20
    savers_credit_tentative: 400
    savers_credit: 400

- name: Single filer with 10% rate
  description: Single filer with AGI between $25,001 and $38,250 gets 10% rate
  period: 2024
  input:
    filing_status: SINGLE
    adjusted_gross_income: 30000
    elective_deferrals: 2000
    traditional_ira_contributions: 0
    roth_ira_contributions: 0
    age: 35
    is_tax_unit_dependent: False
    is_full_time_student: False
    tax_liability_before_credits: 3000
  output:
    savers_credit_applicable_percentage: 0.10
    savers_credit_tentative: 200
    savers_credit: 200

- name: Single filer over income limit
  description: Single filer with AGI over $38,250 gets no credit
  period: 2024
  input:
    filing_status: SINGLE
    adjusted_gross_income: 40000
    elective_deferrals: 2000
    traditional_ira_contributions: 0
    roth_ira_contributions: 0
    age: 40
    is_tax_unit_dependent: False
    is_full_time_student: False
    tax_liability_before_credits: 4000
  output:
    savers_credit_applicable_percentage: 0.0
    savers_credit: 0

