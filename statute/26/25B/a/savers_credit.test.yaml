# --- Nonrefundable Credit Tests ---

- name: Credit limited by tax liability
  description: Nonrefundable credit cannot exceed tax liability
  period: 2024
  input:
    filing_status: SINGLE
    adjusted_gross_income: 18000
    elective_deferrals: 2000
    traditional_ira_contributions: 0
    roth_ira_contributions: 0
    age: 25
    is_tax_unit_dependent: False
    is_full_time_student: False
    tax_liability_before_credits: 500
  output:
    savers_credit_applicable_percentage: 0.50
    savers_credit_tentative: 1000
    savers_credit: 500

- name: Zero tax liability means no credit
  description: With zero tax liability, nonrefundable credit is zero
