      - hqw_min: 929
        hqw_max: 1299
        wba: 40  # Minimum WBA
      - hqw_min: 1300
        hqw_max: 1549
        wba: 50
      - hqw_min: 1550
        hqw_max: 1849
        wba: 60
      - hqw_min: 1850
        hqw_max: 2149
        wba: 70
      - hqw_min: 2150
        hqw_max: 2449
        wba: 80
      - hqw_min: 2450
        hqw_max: 2749
        wba: 90
      - hqw_min: 2750
        hqw_max: 3049
        wba: 100
      # ... continues in $300 increments
      - hqw_min: 10350
        hqw_max: 999999
        wba: 450  # Maximum WBA
  citations:
    - "Cal. Unemp. Ins. Code 1280"
