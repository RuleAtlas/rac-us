# Tests for 26 USC Section 6401 - Total Refundable Credits

- name: No refundable credits
  period: 2024
  input:
    tax_units:
      - id: filer
        earned_income_credit: 0
        additional_child_tax_credit: 0
        education_credits_refundable: 0
  output:
    total_refundable_credits: 0

