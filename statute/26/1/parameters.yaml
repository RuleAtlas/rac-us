# Federal Income Tax Brackets - 26 USC Section 1
#
# Per Section 1, ordinary income is taxed at progressive marginal rates.
# Rates are fixed in statute; thresholds are indexed annually per Rev. Proc.
#
# Sources:
# - 26 USC 1: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title26-section1
# - Rev. Proc. 2023-34 (2024 thresholds): https://www.irs.gov/pub/irs-drop/rp-23-34.pdf
# - Rev. Proc. 2024-40 (2025 thresholds): https://www.irs.gov/pub/irs-drop/rp-24-40.pdf

gov.irs.income_tax:
  # ===========================================================================
  # BRACKET STRUCTURE (for use with marginal_agg)
  # ===========================================================================
  # Rates are fixed in statute per 26 USC 1.
  # Thresholds are indexed annually per Rev. Proc.
  # marginal_agg expects: brackets.rates = [rate0, rate1, ...]
  #                       brackets.thresholds = {filing_status: [threshold0, ...]}
  brackets:
    description: "Ordinary income tax bracket structure for marginal_agg"
    reference: "26 USC 1(a)-(d); Rev. Proc. 2023-34, 2024-40"
    # Rates: 10%, 12%, 22%, 24%, 32%, 35%, 37%
    rates: [0.10, 0.12, 0.22, 0.24, 0.32, 0.35, 0.37]
    thresholds:
      # Single filers - 26 USC 1(c)
      single:
        2025: [0, 11925, 48475, 103350, 197300, 250525, 626350]
        2024: [0, 11600, 47150, 100525, 191950, 243725, 609350]
        2023: [0, 11000, 44725, 95375, 182100, 231250, 578125]
        2022: [0, 10275, 41775, 89075, 170050, 215950, 539900]
        2021: [0, 9950, 40525, 86375, 164925, 209425, 523600]
        2020: [0, 9875, 40125, 85525, 163300, 207350, 518400]
      # Married filing jointly - 26 USC 1(a)
      joint:
        2025: [0, 23850, 96950, 206700, 394600, 501050, 751600]
        2024: [0, 23200, 94300, 201050, 383900, 487450, 731200]
        2023: [0, 22000, 89450, 190750, 364200, 462500, 693750]
        2022: [0, 20550, 83550, 178150, 340100, 431900, 647850]
        2021: [0, 19900, 81050, 172750, 329850, 418850, 628300]
        2020: [0, 19750, 80250, 171050, 326600, 414700, 622050]
      # Head of household - 26 USC 1(b)
      head_of_household:
        2025: [0, 17000, 64850, 103350, 197300, 250500, 626350]
        2024: [0, 16550, 63100, 100500, 191950, 243700, 609350]
        2023: [0, 15700, 59850, 95350, 182100, 231250, 578100]
        2022: [0, 14650, 55900, 89050, 170050, 215950, 539900]
        2021: [0, 14200, 54200, 86350, 164900, 209400, 523600]
        2020: [0, 14100, 53700, 85500, 163300, 207350, 518400]
      # Married filing separately - 26 USC 1(d)
      married_filing_separately:
        2025: [0, 11925, 48475, 103350, 197300, 250525, 375800]
        2024: [0, 11600, 47150, 100525, 191950, 243725, 365600]
        2023: [0, 11000, 44725, 95375, 182100, 231250, 346875]
        2022: [0, 10275, 41775, 89075, 170050, 215950, 323925]
        2021: [0, 9950, 40525, 86375, 164925, 209425, 314150]
        2020: [0, 9875, 40125, 85525, 163300, 207350, 311025]
      # Surviving spouse (same as joint)
      surviving_spouse:
        2025: [0, 23850, 96950, 206700, 394600, 501050, 751600]
        2024: [0, 23200, 94300, 201050, 383900, 487450, 731200]
        2023: [0, 22000, 89450, 190750, 364200, 462500, 693750]
        2022: [0, 20550, 83550, 178150, 340100, 431900, 647850]
        2021: [0, 19900, 81050, 172750, 329850, 418850, 628300]
        2020: [0, 19750, 80250, 171050, 326600, 414700, 622050]
