  # ===========================================================================
  # BRACKET STRUCTURE (for use with marginal_agg)
  # ===========================================================================
  # Combined structure for bracket functions.
  # Rates are fixed in statute per 26 USC 1(h)(1), thresholds indexed annually.
  # marginal_agg expects: brackets.rates = [rate0, rate1, rate2, ...]
  #                       brackets.thresholds = {filing_status: [threshold0, ...]}
  brackets:
    description: "Capital gains bracket structure for marginal_agg"
    reference: "26 USC 1(h)(1)(B), (C), (D)"
    rates: [0.00, 0.15, 0.20]
    thresholds:
      # Single filer thresholds per Rev. Proc.
      single:
        2025: [0, 48350, 533400]
        2024: [0, 47025, 518900]
        2023: [0, 44625, 492300]
        2022: [0, 41675, 459750]
        2021: [0, 40400, 445850]
        2020: [0, 40000, 441450]
      # Married filing jointly per Rev. Proc.
      joint:
        2025: [0, 96700, 600050]
        2024: [0, 94050, 583750]
        2023: [0, 89250, 553850]
        2022: [0, 83350, 517200]
        2021: [0, 80800, 501600]
