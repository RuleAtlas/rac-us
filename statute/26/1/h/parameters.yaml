# Capital Gains Tax Brackets - 26 USC Section 1(h)
#
# Per Section 1(h), net capital gain and qualified dividend income are taxed
# at preferential rates:
#   - 0%  on portion within the 0% bracket (Section 1(h)(1)(B))
#   - 15% on portion within the 15% bracket (Section 1(h)(1)(C))
#   - 20% on portion above the 15% bracket (Section 1(h)(1)(D))
#
# The thresholds are indexed annually by IRS (Rev. Proc.).
# Rates are fixed in statute and do not change.
#
# Sources:
# - 26 USC 1(h): https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title26-section1
# - Rev. Proc. 2023-34 (2024 thresholds): https://www.irs.gov/pub/irs-drop/rp-23-34.pdf
# - Rev. Proc. 2024-40 (2025 thresholds): https://www.irs.gov/pub/irs-drop/rp-24-40.pdf

gov.irs.capital_gains:
  # ===========================================================================
  # RATES (Fixed in statute - 26 USC 1(h)(1))
  # ===========================================================================
  rates:
    description: "Capital gains and qualified dividend tax rates per 26 USC 1(h)(1)"
    unit: rate
    label: "Capital Gains Tax Rates"
    reference: "26 USC 1(h)(1)(B), (C), (D)"
    # Rates: [0%, 15%, 20%]
    values:
      2013-01-01: [0.00, 0.15, 0.20]
      # Before 2013, rates were 0%, 15% (no 20% bracket)
      2003-01-01: [0.00, 0.15]
      # Before 2003, rates were different
      1997-01-01: [0.10, 0.20]

  # ===========================================================================
  # THRESHOLDS - 0% Rate Maximum (Section 1(h)(1)(B))
  # ===========================================================================
  # 0% rate applies to preferential income up to this threshold
  thresholds:
    zero_pct_max:
      single:
        description: "Maximum taxable income for 0% capital gains rate (single filers)"
        unit: currency-USD
        period: year
        label: "0% Rate Ceiling (Single)"
        reference: "26 USC 1(h)(1)(B); Rev. Proc. 2023-34"
        values:
          2025-01-01: 48350
          2024-01-01: 47025
          2023-01-01: 44625
          2022-01-01: 41675
          2021-01-01: 40400
          2020-01-01: 40000

      joint:
        description: "Maximum taxable income for 0% capital gains rate (married filing jointly)"
        unit: currency-USD
        period: year
        label: "0% Rate Ceiling (Joint)"
        reference: "26 USC 1(h)(1)(B); Rev. Proc. 2023-34"
        values:
          2025-01-01: 96700
          2024-01-01: 94050
          2023-01-01: 89250
          2022-01-01: 83350
          2021-01-01: 80800
          2020-01-01: 80000

      head_of_household:
        description: "Maximum taxable income for 0% capital gains rate (head of household)"
        unit: currency-USD
        period: year
        label: "0% Rate Ceiling (HOH)"
        reference: "26 USC 1(h)(1)(B); Rev. Proc. 2023-34"
        values:
          2025-01-01: 64750
          2024-01-01: 63000
          2023-01-01: 59750
          2022-01-01: 55800
          2021-01-01: 54100
          2020-01-01: 53600

      married_filing_separately:
        description: "Maximum taxable income for 0% capital gains rate (married filing separately)"
        unit: currency-USD
        period: year
        label: "0% Rate Ceiling (MFS)"
        reference: "26 USC 1(h)(1)(B); Rev. Proc. 2023-34"
        values:
          2025-01-01: 48350
          2024-01-01: 47025
          2023-01-01: 44625
          2022-01-01: 41675
          2021-01-01: 40400
          2020-01-01: 40000

      surviving_spouse:
        description: "Maximum taxable income for 0% capital gains rate (surviving spouse)"
        unit: currency-USD
        period: year
        label: "0% Rate Ceiling (Surviving Spouse)"
        reference: "26 USC 1(h)(1)(B); Rev. Proc. 2023-34"
        values:
          2025-01-01: 96700
          2024-01-01: 94050
          2023-01-01: 89250
          2022-01-01: 83350
          2021-01-01: 80800
          2020-01-01: 80000

    # ===========================================================================
    # THRESHOLDS - 15% Rate Maximum (Section 1(h)(1)(C))
    # ===========================================================================
    # 15% rate applies above 0% threshold up to this threshold; 20% above
    fifteen_pct_max:
      single:
        description: "Maximum taxable income for 15% capital gains rate (single filers)"
        unit: currency-USD
        period: year
        label: "15% Rate Ceiling (Single)"
        reference: "26 USC 1(h)(1)(C); Rev. Proc. 2023-34"
        values:
          2025-01-01: 533400
          2024-01-01: 518900
          2023-01-01: 492300
