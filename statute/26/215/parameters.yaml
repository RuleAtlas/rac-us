# 26 USC Section 215 - Alimony Deduction Parameters
#
# Section 215 was REPEALED by the Tax Cuts and Jobs Act (TCJA) of 2017
# (P.L. 115-97, Section 11051) for divorce or separation instruments:
#   - Executed after December 31, 2018, OR
#   - Modified after December 31, 2018, if the modification expressly
#     provides that the TCJA amendments apply to such modification
#
# For pre-2019 instruments: Alimony is deductible by the payer (above-the-line)
# For post-2018 instruments: Alimony payments are NOT deductible
#
# IMPORTANT: The controlling factor is the DATE OF THE DIVORCE INSTRUMENT,
# not the tax year. A taxpayer in 2024 with a 2015 divorce can still deduct
# alimony payments.
#
# Per 26 USC 62(a)(10): The alimony deduction is an above-the-line deduction.

reference: "26 USC Section 215; 26 USC 62(a)(10); P.L. 115-97 Section 11051"

description: "Parameters for alimony deduction under IRC Section 215"

# =============================================================================
# ALIMONY DEDUCTION RATE
# =============================================================================
# This parameter indicates the rate at which alimony is deductible
# for agreements governed by pre-2019 rules.
#
# The rate is 1.0 (100%) for pre-2019 agreements and 0 for post-2018 agreements.
# However, since the agreement date (not tax year) controls, this parameter
# serves primarily as documentation. The actual logic uses is_pre_2019_divorce_agreement.

alimony_deduction_rate:
  description: "Rate at which alimony payments are deductible by the payer"
  unit: rate
  values:
    # Pre-TCJA: Full deduction allowed (above-the-line per 62(a)(10))
    - date: 1942-01-01
      value: 1.0
      reference: "Revenue Act of 1942; 26 USC 215(a); 26 USC 62(a)(10)"
    # Post-TCJA: The statute is repealed for new instruments
    # Note: This rate applies to NEW instruments only, not existing ones
    # For existing pre-2019 instruments, alimony remains deductible
    - date: 2019-01-01
      value: 0.0
      reference: "P.L. 115-97 Section 11051 (TCJA); effective for instruments executed after Dec 31, 2018"
  notes: |
    CRITICAL: This parameter documents the statutory change but the actual
    tax treatment depends on the date of the divorce/separation instrument,
    NOT the tax year. Pre-2019 instruments continue to allow the payer
    to deduct alimony payments regardless of what tax year we're in.

    The alimony deduction is an ABOVE-THE-LINE deduction per 26 USC 62(a)(10),
    meaning it reduces adjusted gross income (AGI).
