# 26 USC 1401 - Self-Employment Tax Tests
#
# Test cases for validating SE tax implementation against known values.
# Uses 2024 tax year parameters.
#
# Key 2024 parameters:
# - OASDI rate: 12.4%
# - HI rate: 2.9%
# - Base SE rate: 15.3%
# - Additional Medicare Tax: 0.9% on income above threshold
# - SS wage base: $168,600
# - Net earnings = 92.35% of gross SE income (per 1402(a))
#
# Additional Medicare Tax thresholds (1401(b)(2)):
# - Joint: $250,000
# - MFS: $125,000
# - Single/HOH: $200,000

reference: "26 USC 1401"
tax_year: 2024

tests:
  # Test 1: Basic SE income below wage base
  - name: "Self-employment income below wage base"
    inputs:
      self_employment_income: 50000
      # PE already applies 92.35% to get taxable_self_employment_income
      # So net SE earnings = 50000 * 0.9235 = 46175
      taxable_self_employment_income: 46175
      employment_income: 0
    expected:
      # SS tax: 46175 * 0.124 = 5725.70
      # Medicare tax: 46175 * 0.029 = 1339.08
      # Total: 7064.78
      self_employment_social_security_tax: 5725.70
      self_employment_medicare_tax: 1339.08
      self_employment_tax: 7064.78
      se_tax_deduction: 3532.39
    notes: "Full SE income subject to both SS and Medicare taxes"

  # Test 2: SE income at exactly the wage base
  - name: "Self-employment income at wage base"
    inputs:
      self_employment_income: 182575  # 182575 * 0.9235 = 168600 (wage base)
      taxable_self_employment_income: 168600
      employment_income: 0
    expected:
      # SS tax: 168600 * 0.124 = 20906.40
      # Medicare tax: 168600 * 0.029 = 4889.40
      # Total: 25795.80
      self_employment_social_security_tax: 20906.40
      self_employment_medicare_tax: 4889.40
      self_employment_tax: 25795.80
      se_tax_deduction: 12897.90
    notes: "SE income exactly at wage base cap"

  # Test 3: SE income exceeds wage base
  - name: "Self-employment income exceeds wage base"
    inputs:
      self_employment_income: 250000  # 250000 * 0.9235 = 230875
      taxable_self_employment_income: 230875
      employment_income: 0
    expected:
      # SS tax: 168600 (capped) * 0.124 = 20906.40
      # Medicare tax: 230875 * 0.029 = 6695.38
      # Total: 27601.78
      self_employment_social_security_tax: 20906.40
      self_employment_medicare_tax: 6695.38
      self_employment_tax: 27601.78
      se_tax_deduction: 13800.89
    notes: "SS tax capped at wage base, Medicare on full amount"

  # Test 4: W-2 wages use part of wage base
  - name: "W-2 wages reduce available wage base for SE"
    inputs:
      self_employment_income: 100000  # 100000 * 0.9235 = 92350
      taxable_self_employment_income: 92350
      employment_income: 100000  # W-2 wages
      # taxable_earnings_for_social_security = 100000 (all subject to SS)
    expected:
      # Remaining cap: 168600 - 100000 = 68600
      # SE income subject to SS: min(92350, 68600) = 68600
      # SS tax: 68600 * 0.124 = 8506.40
      # Medicare tax: 92350 * 0.029 = 2678.15
      # Total: 11184.55
      social_security_cap_remaining: 68600
      social_security_taxable_self_employment_income: 68600
      self_employment_social_security_tax: 8506.40
      self_employment_medicare_tax: 2678.15
      self_employment_tax: 11184.55
      se_tax_deduction: 5592.28
    notes: "W-2 wages reduce SS cap available for SE income"

  # Test 5: W-2 wages exhaust wage base
  - name: "W-2 wages exhaust wage base"
    inputs:
      self_employment_income: 50000  # 50000 * 0.9235 = 46175
      taxable_self_employment_income: 46175
      employment_income: 175000  # Exceeds wage base
    expected:
      # Remaining cap: max(0, 168600 - 168600) = 0
      # SE income subject to SS: 0
      # SS tax: 0
      # Medicare tax: 46175 * 0.029 = 1339.08
      # Total: 1339.08
      social_security_cap_remaining: 0
      social_security_taxable_self_employment_income: 0
      self_employment_social_security_tax: 0
      self_employment_medicare_tax: 1339.08
      self_employment_tax: 1339.08
      se_tax_deduction: 669.54
    notes: "No SS tax on SE income when W-2 wages exhaust wage base"

  # Test 6: Zero SE income
  - name: "Zero self-employment income"
    inputs:
      self_employment_income: 0
      taxable_self_employment_income: 0
      employment_income: 50000
    expected:
      self_employment_social_security_tax: 0
      self_employment_medicare_tax: 0
      self_employment_tax: 0
      se_tax_deduction: 0
    notes: "No SE tax when no SE income"

  # Test 7: Very high SE income
  - name: "Very high self-employment income"
    inputs:
      self_employment_income: 500000  # 500000 * 0.9235 = 461750
      taxable_self_employment_income: 461750
      employment_income: 0
    expected:
      # SS tax: 168600 (capped) * 0.124 = 20906.40
      # Medicare tax: 461750 * 0.029 = 13390.75
      # Total: 34297.15
      self_employment_social_security_tax: 20906.40
      self_employment_medicare_tax: 13390.75
      self_employment_tax: 34297.15
      se_tax_deduction: 17148.58
    notes: "High earner - SS capped, Medicare on full amount"

  # Test 8: Mixed income near wage base boundary
  - name: "Mixed income near wage base boundary"
    inputs:
      self_employment_income: 108389  # 108389 * 0.9235 = 100097
      taxable_self_employment_income: 100097
      employment_income: 68503  # W-2 wages
    expected:
      # Remaining cap: 168600 - 68503 = 100097
      # SE income subject to SS: min(100097, 100097) = 100097
      # SS tax: 100097 * 0.124 = 12412.03
      # Medicare tax: 100097 * 0.029 = 2902.81
      # Total: 15314.84
      social_security_cap_remaining: 100097
      social_security_taxable_self_employment_income: 100097
      self_employment_social_security_tax: 12412.03
      self_employment_medicare_tax: 2902.81
      self_employment_tax: 15314.84
      se_tax_deduction: 7657.42
    notes: "Mixed income exactly filling remaining wage base cap"

# =============================================================================
# ADDITIONAL MEDICARE TAX TESTS - 26 USC 1401(b)(2)
# =============================================================================

  # Test 9: SE income below Additional Medicare Tax threshold (single)
  - name: "SE income below $200k threshold - no Additional Medicare Tax"
    inputs:
      self_employment_income: 150000  # 150000 * 0.9235 = 138525
      taxable_self_employment_income: 138525
      employment_income: 0
      filing_status: SINGLE
    expected:
      # SS tax: 138525 * 0.124 = 17177.10
      # Medicare tax: 138525 * 0.029 = 4017.23
      # Base SE tax: 21194.33
      # Additional Medicare Tax: 0 (below $200k threshold)
      self_employment_social_security_tax: 17177.10
      self_employment_medicare_tax: 4017.23
      base_self_employment_tax: 21194.33
      self_employment_additional_medicare_tax: 0
    notes: "SE income below threshold - no additional tax"
    citations:
      - "26 USC 1401(b)(2)(C): $200,000 threshold for single"

  # Test 10: SE income above threshold - single filer
  - name: "SE income above $200k threshold - Additional Medicare Tax applies"
    inputs:
      self_employment_income: 300000  # 300000 * 0.9235 = 277050
      taxable_self_employment_income: 277050
      employment_income: 0
      filing_status: SINGLE
    expected:
      # SS tax: 168600 (capped) * 0.124 = 20906.40
      # Medicare tax: 277050 * 0.029 = 8034.45
      # Base SE tax: 28940.85
      # Additional Medicare Tax: (277050 - 200000) * 0.009 = 77050 * 0.009 = 693.45
      self_employment_social_security_tax: 20906.40
      self_employment_medicare_tax: 8034.45
      base_self_employment_tax: 28940.85
      se_income_subject_to_additional_medicare_tax: 77050
      self_employment_additional_medicare_tax: 693.45
    notes: "High SE income triggers Additional Medicare Tax"
    citations:
      - "26 USC 1401(b)(2): 0.9% on SE income above threshold"

  # Test 11: Joint filers with SE income above $250k threshold
  - name: "Joint filers - SE income above $250k threshold"
    inputs:
      self_employment_income: 400000  # 400000 * 0.9235 = 369400
      taxable_self_employment_income: 369400
      employment_income: 0
      filing_status: JOINT
    expected:
      # SS tax: 168600 (capped) * 0.124 = 20906.40
      # Medicare tax: 369400 * 0.029 = 10712.60
      # Base SE tax: 31619.00
      # Additional Medicare Tax: (369400 - 250000) * 0.009 = 119400 * 0.009 = 1074.60
      self_employment_social_security_tax: 20906.40
      self_employment_medicare_tax: 10712.60
      base_self_employment_tax: 31619.00
      additional_medicare_tax_threshold: 250000
      se_income_subject_to_additional_medicare_tax: 119400
      self_employment_additional_medicare_tax: 1074.60
    notes: "Joint filers have higher $250k threshold"
    citations:
      - "26 USC 1401(b)(2)(A): $250,000 threshold for joint"

  # Test 12: Married filing separately - lower $125k threshold
  - name: "MFS filer - lower $125k threshold"
    inputs:
      self_employment_income: 200000  # 200000 * 0.9235 = 184700
      taxable_self_employment_income: 184700
      employment_income: 0
      filing_status: SEPARATE
    expected:
      # SS tax: 168600 (capped) * 0.124 = 20906.40
      # Medicare tax: 184700 * 0.029 = 5356.30
      # Base SE tax: 26262.70
      # Additional Medicare Tax: (184700 - 125000) * 0.009 = 59700 * 0.009 = 537.30
      self_employment_social_security_tax: 20906.40
      self_employment_medicare_tax: 5356.30
      base_self_employment_tax: 26262.70
      additional_medicare_tax_threshold: 125000
      se_income_subject_to_additional_medicare_tax: 59700
      self_employment_additional_medicare_tax: 537.30
    notes: "MFS has lowest threshold - most additional tax"
    citations:
      - "26 USC 1401(b)(2)(B): $125,000 threshold for MFS"

  # Test 13: Mixed W-2 and SE income - wages use threshold
  - name: "Mixed income - wages partially use threshold"
    inputs:
      self_employment_income: 100000  # 100000 * 0.9235 = 92350
      taxable_self_employment_income: 92350
      employment_income: 150000  # W-2 wages
      filing_status: SINGLE
    expected:
      # Combined income: 150000 + 92350 = 242350
      # Threshold: $200k
      # Wages use $150k of threshold, leaving $50k for SE
      # SE above remaining threshold: 92350 - 50000 = 42350
      # Additional Medicare Tax: 42350 * 0.009 = 381.15
      combined_medicare_income: 242350
      additional_medicare_tax_threshold: 200000
      se_income_subject_to_additional_medicare_tax: 42350
      self_employment_additional_medicare_tax: 381.15
    notes: "W-2 wages reduce threshold available for SE income"
    citations:
      - "26 USC 1401(b)(2): combined wages and SE income"

  # Test 14: W-2 wages already exceed threshold - all SE income taxed
  - name: "W-2 wages exceed threshold - all SE income gets additional tax"
    inputs:
      self_employment_income: 50000  # 50000 * 0.9235 = 46175
      taxable_self_employment_income: 46175
      employment_income: 220000  # W-2 wages exceed $200k threshold
      filing_status: SINGLE
    expected:
      # Wages ($220k) already exceed $200k threshold
      # All SE income is subject to Additional Medicare Tax
      combined_medicare_income: 266175
      additional_medicare_tax_threshold: 200000
      se_income_subject_to_additional_medicare_tax: 46175
      self_employment_additional_medicare_tax: 415.58  # 46175 * 0.009
    notes: "When wages exceed threshold, all SE income taxed at 0.9%"

  # Test 15: Exactly at threshold - no additional tax
  - name: "SE income exactly at threshold - no additional tax"
    inputs:
      self_employment_income: 216591  # 216591 * 0.9235 = 200017 (approximately)
      taxable_self_employment_income: 200000  # Exactly at threshold
      employment_income: 0
      filing_status: SINGLE
    expected:
      combined_medicare_income: 200000
      additional_medicare_tax_threshold: 200000
      se_income_subject_to_additional_medicare_tax: 0
      self_employment_additional_medicare_tax: 0
    notes: "Income must EXCEED threshold, not equal it"
    citations:
      - "26 USC 1401(b)(2): income that 'exceeds' threshold"
