# ===========================================================================
# Tribal Enhanced Benefit Tests (47 USC § 1752(a)(7)(A)(ii))
# ===========================================================================

- name: tribal_enhanced_benefit
  description: "Tribal household gets $75/month = $900/year"
  period: 2023
  inputs:
    household_size: 4
    gross_income: 40000  # Below 200% FPL
    is_on_tribal_land: true
    receives_free_school_meals: false
    receives_reduced_price_school_meals: false
    receives_pell_grant: false
    receives_wic: false
    receives_medicaid: false
    receives_snap: false
    receives_ssi: false
    broadband_cost: 1200  # $100/month
    lifeline: 411  # Getting tribal Lifeline
  outputs:
    is_acp_eligible: true
    acp_monthly_max: 75
    broadband_cost_after_lifeline: 789  # 1200 - 411
    acp: 789  # min(900, 789) = 789 (capped at remaining cost)

# ===========================================================================
# Program Expiration Tests (June 2024)
# ===========================================================================

- name: acp_expired_after_june_2024
  description: "ACP benefit is $0 after program funding expired"
  period: 2025
  inputs:
    household_size: 2
    gross_income: 30000  # Below 200% FPL
    is_on_tribal_land: false
    receives_free_school_meals: false
    receives_reduced_price_school_meals: false
    receives_pell_grant: false
    receives_wic: false
    receives_medicaid: false
    receives_snap: false
    receives_ssi: false
    broadband_cost: 720
    lifeline: 0
  outputs:
    is_acp_eligible: true  # Still technically eligible
    acp_monthly_max: 0  # But benefit is $0 per parameter
    acp: 0

# ===========================================================================
# Benefit Calculation Tests
# ===========================================================================

- name: benefit_capped_at_remaining_costs
  description: "Benefit cannot exceed broadband costs after Lifeline"
  period: 2023
  inputs:
    household_size: 1
    gross_income: 20000
    is_on_tribal_land: false
    receives_free_school_meals: false
    receives_reduced_price_school_meals: false
    receives_pell_grant: false
    receives_wic: false
    receives_medicaid: false
    receives_snap: false
    receives_ssi: false
    broadband_cost: 240  # Only $20/month
    lifeline: 111  # Getting Lifeline
  outputs:
    is_acp_eligible: true
    broadband_cost_after_lifeline: 129  # 240 - 111
    acp: 129  # min(360, 129) = 129

- name: no_acp_if_lifeline_covers_all
  description: "Zero ACP if Lifeline covers all broadband costs"
  period: 2023
  inputs:
    household_size: 1
    gross_income: 15000
    is_on_tribal_land: false
    receives_free_school_meals: false
    receives_reduced_price_school_meals: false
    receives_pell_grant: false
    receives_wic: false
    receives_medicaid: false
    receives_snap: false
    receives_ssi: false
    broadband_cost: 100  # Only $8.33/month
    lifeline: 100  # Lifeline covers it all
  outputs:
    is_acp_eligible: true
    broadband_cost_after_lifeline: 0
    acp: 0

