    is_on_tribal_land: false
    receives_free_school_meals: false
    receives_reduced_price_school_meals: false
    receives_pell_grant: false
    receives_wic: false
    receives_medicaid: false
    receives_snap: false
    receives_ssi: false
    broadband_cost: 720
    lifeline: 0
    ebb_amount: 600  # Already on EBB
  outputs:
    is_acp_income_eligible: true
    is_enrolled_in_ebb: true
    is_acp_eligible: false  # Excluded due to EBB
    acp: 0

