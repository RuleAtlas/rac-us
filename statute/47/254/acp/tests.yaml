# 47 USC § 1752 - Affordable Connectivity Program Tests
#
# Test cases for ACP eligibility and benefit calculations.
# 2022-May 2024 parameters: $30/month standard, $75/month tribal
# After June 2024: $0/month (program expired)

# ===========================================================================
# Income Eligibility Tests (47 USC § 1752(a)(6)(A))
# ===========================================================================

- name: income_eligible_below_200_fpl
  description: "Family below 200% FPL qualifies"
  period: 2023
  inputs:
    household_size: 4
    gross_income: 55000  # ~177% of FPL ($31,200 * 1.77)
    is_on_tribal_land: false
    receives_free_school_meals: false
    receives_reduced_price_school_meals: false
    receives_pell_grant: false
    receives_wic: false
    receives_medicaid: false
    receives_snap: false
    receives_ssi: false
    broadband_cost: 720  # $60/month
    lifeline: 0  # Not on Lifeline
  outputs:
    fcc_fpg_ratio: 1.76  # 55000 / 31200 = 1.76
    is_acp_income_eligible: true
    is_acp_eligible: true
    acp: 360  # min(30*12, 720) = min(360, 720) = 360

- name: income_ineligible_above_200_fpl
  description: "Family above 200% FPL does not qualify on income alone"
  period: 2023
  inputs:
    household_size: 2
    gross_income: 60000  # ~268% of FPL ($22,380 * 2.68)
    is_on_tribal_land: false
    receives_free_school_meals: false
    receives_reduced_price_school_meals: false
    receives_pell_grant: false
    receives_wic: false
    receives_medicaid: false
    receives_snap: false
    receives_ssi: false
    broadband_cost: 720
    lifeline: 0
  outputs:
    fcc_fpg_ratio: 2.68
    is_acp_income_eligible: false
    is_acp_eligible: false
    acp: 0

