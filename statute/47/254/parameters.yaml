# 47 USC § 254 - Universal Service (Lifeline Program)
#
# Parameters for the Lifeline program implementing low-income
# telecommunications subsidies.
#
# Statutory Authority:
# - Lifeline: 47 CFR § 54.403, § 54.409 (FCC regulations under § 254)
#
# Note: ACP (Affordable Connectivity Program) parameters have been moved to
# statute/47/1752/parameters.yaml per the statute's proper location.

# ===========================================================================
# Lifeline Program Parameters (47 CFR § 54.403, § 54.409)
# ===========================================================================

lifeline:
  # Benefit amounts per 47 CFR § 54.403
  amount:
    standard:
      description: "Monthly Lifeline benefit for phone or broadband service"
      unit: currency-USD
      period: month
      values:
        2012-04-02: 9.25
      citations:
        - title: "47 CFR § 54.403 - Lifeline support amount"
          href: "https://www.law.cornell.edu/cfr/text/47/54.403"
        - title: "77 FR 12967 - FCC Order establishing $9.25"
          href: "https://www.govinfo.gov/content/pkg/FR-2012-03-02/pdf/2012-4978.pdf#page=17"

    rural_tribal_supplement:
      description: "Additional monthly Lifeline benefit for rural Tribal lands"
      unit: currency-USD
      period: month
      values:
        2012-04-02: 25
      citations:
        - title: "47 CFR § 54.403(a)(3) - Enhanced Lifeline support"
          href: "https://www.law.cornell.edu/cfr/text/47/54.403#a_3"

  # Income eligibility threshold per 47 CFR § 54.409
  fpg_limit:
    description: "Maximum household income as fraction of Federal Poverty Guidelines"
    unit: ratio
    period: year
    values:
      2016-12-01: 1.35
    citations:
      - title: "47 CFR § 54.409 - Consumer qualification for Lifeline"
        href: "https://www.law.cornell.edu/cfr/text/47/54.409"
      - title: "FCC Lifeline Program for Low-Income Consumers"
        href: "https://www.fcc.gov/general/lifeline-program-low-income-consumers"

  # Categorical eligibility - non-tribal households (47 CFR § 54.409(b))
  categorical_eligibility:
    description: "Programs that qualify household for Lifeline (non-tribal)"
    values:
      2016-12-01:
        - medicaid
        - snap
        - ssi
        # Not implemented:
        # - veterans_pension (Veterans and Survivors Pension Benefit)
        # - federal_public_housing (Federal Public Housing Assistance / Section 8)
    citations:
      - title: "47 CFR § 54.409(b) - Qualifying programs"
        href: "https://www.law.cornell.edu/cfr/text/47/54.409#b"

  # Categorical eligibility - tribal households (47 CFR § 54.409(b))
  tribal_categorical_eligibility:
    description: "Programs that qualify tribal household for Lifeline"
    values:
      2016-12-01:
        - head_start
        - fdpir
        - tanf
        # Not implemented:
        # - bia_general_assistance (Bureau of Indian Affairs General Assistance)
        # - tribally_administered_tanf (Tribally Administered TANF)
        # - food_distribution_program (Food Distribution Program on Indian Reservations)
    citations:
      - title: "47 CFR § 54.409(b) - Qualifying programs (Tribal)"
        href: "https://www.law.cornell.edu/cfr/text/47/54.409#b"


# ===========================================================================
# ACP Parameters (DEPRECATED - moved to statute/47/1752/)
# ===========================================================================
# See statute/47/1752/parameters.yaml for ACP parameters.
# ACP is codified at 47 USC 1752, not 47 USC 254.


# ===========================================================================
# Shared Variables and Cross-References
# ===========================================================================

# FCC uses IRS gross income for income calculations
# per 47 CFR § 54.400(f) - "gross income"
income_definition:
  description: "Income measure for FCC program eligibility"
  source: "irs_gross_income"
  citations:
    - title: "47 CFR § 54.400(f) - Definition of income"
      href: "https://www.law.cornell.edu/cfr/text/47/54.400#f"
